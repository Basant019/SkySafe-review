<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkySafe Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Create Account</h2>

<div class="row justify-content-center">
<div class="col-md-5">

<form id="form">

<div class="mb-3">
<label class="form-label">First Name</label>
<input type="text" id="fname" class="form-control" placeholder="Enter name">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="p1" class="form-control" placeholder="Enter password">
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" id="p2" class="form-control" placeholder="Confirm password">
</div>

<button type="submit" class="btn btn-primary w-100">
Register
</button>

</form>

<p id="msg" class="text-center mt-3"></p>

</div>
</div>

</div>

<script src="js/signup.js"></script>

</body>
</html>
