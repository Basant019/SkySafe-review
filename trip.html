<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trip Planner | SkySafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- Routing -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/trip.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">SkySafe</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="weather.html">Weather</a></li>
                <li class="nav-item"><a class="nav-link" href="aleart.html">Alert</a></li>
                <li class="nav-item"><a class="nav-link active" href="trip.html">Trip Planner</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="logout.html">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- TRIP PLANNER -->
<div class="container mt-5">
    <h2 class="text-center text-light mb-4">Smart Trip Planner</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card glass p-4">

                <p class="text-muted text-center">Destination selected from Weather page</p>

                <label class="form-label">Start Location</label>
                <input type="text" id="startLocation" class="form-control mb-3" placeholder="Enter starting city">

                <label class="form-label">Destination</label>
                <input type="text" id="destination" class="form-control mb-3" readonly>

                <label class="form-label">Travel Date</label>
                <input type="date" id="tripDate" class="form-control mb-3">

                <button class="btn btn-primary w-100" onclick="planTripAndRoute()">
                    Check Travel Safety & Route
                </button>
            </div>
        </div>
    </div>

    <!-- RESULT -->
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div id="tripResult" class="alert d-none text-center"></div>
            <div id="bestTime" class="text-light fw-bold text-center mt-2"></div>
            <div id="safetyScore" class="text-warning text-center mt-2"></div>
        </div>
    </div>

    <!-- MAP -->
    <div class="row justify-content-center mt-4">
        <div class="col-md-10">
            <div id="map"></div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="js/trip.js"></script>

</body>
</html>
