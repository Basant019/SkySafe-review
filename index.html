<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Forecast | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<h1 class="title">🌤 Weather Forecast</h1>

<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card login-card shadow-lg">
        <div class="row g-0">

            <!-- Left -->
            <div class="col-md-6 left-box">
                <h2>SkySafe</h2>
                <p>
                    Get real-time weather updates, alerts and forecasts with a modern dashboard experience.
                </p>
            </div>

            <!-- Right -->
            <div class="col-md-6 p-4">
                <h4 class="mb-3">Sign in</h4>
                <p class="text-muted small">Use your Google Account</p>

                <form>
                    <input id="Email" type="email" class="form-control mb-3" placeholder="Email or phone">
                    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

                    <div class="d-flex align-items-center mb-3">
                        <input type="checkbox" class="me-2">
                        <span class="small text-muted">Remember me</span>
                    </div>

                    <a href="#" class="small text-primary d-block mb-3">Forgot email?</a>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="newuser.html" class="text-primary small">Create account</a>
                        <button id="n" class="btn btn-primary px-4">Next</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
<script src="js/script.js"></script>

</body>
</html>
