<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/weather.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">SkySafe</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="weather.html">Weather</a></li>
                <li class="nav-item"><a class="nav-link" href="aleart.html">Alert</a></li>
                <li class="nav-item"><a class="nav-link" href="disaster.html">Disaster Hub</a></li>
                <li class="nav-item"><a class="nav-link active" href="trip.html">Trip Planner</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="logout.html">Logout</a></li>
                <li class="nav-item"><a class="nav-link" href="forcast.html">Forcast</a></li>

            </ul>
        </div>
    </div>
</nav>


<!-- SEARCH -->
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
                <button class="btn btn-primary" onclick="getWeather()">Search</button>
            </div>
        </div>
    </div>
</div>

<!-- ALERT -->
<div class="container mt-3 text-center">
    <div id="alertBox" class="alert d-none"></div>
</div>

<!-- WEATHER CARD -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <div id="weatherIcon" style="font-size:40px;"></div>
                    <h5 id="cityName">City</h5>
                    <h1 id="temperature">--°C</h1>
                    <p id="description">---</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EXTRA INFO -->
<div class="container mt-4">
    <div class="row text-center">
        <div class="col-md-3 col-6 text-light"><p>Humidity: <span id="humidity">--%</span></p></div>
        <div class="col-md-3 col-6  text-light"><p>Wind: <span id="wind">-- km/h</span></p></div>
        <div class="col-md-3 col-6  text-light"><p>Pressure: <span id="pressure">-- hPa</span></p></div>
        <div class="col-md-3 col-6  text-light"><p>Visibility: <span id="visibility">-- km</span></p></div>
    </div>
</div>

<!-- ADVICE -->
<div class="container mt-3 text-center">
    <div id="adviceBox" class="alert alert-info d-none"></div>
</div>

<!-- DISASTER LINK -->
<div class="container mt-3 text-center">
    <a href="disaster.html" class="btn btn-warning btn-lg" id="disaster-link">
        <i class="fas fa-shield-alt"></i> Check Disaster Risk Analysis
    </a>
    <p class="text-muted mt-2">Analyze current weather conditions for potential disaster risks</p>
</div>

<script src="js/apikey.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
